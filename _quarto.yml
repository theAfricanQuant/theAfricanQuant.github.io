# This file controls the settings for your Quarto template from www.marvinschmitt.com

# website settings
website:
  title: "SisengAI"                                # Your name
  description: "SisengAI is a website that showcases my venture in to Data Science, Machine Learning, Financial Engineering and NLP."   # A brief slogan (optional)
  image: img/Ricky_Macharm.png
  
  favicon: img/favicon_32x32.png
  
  # start of the navigation bar at the top of the website
  navbar:
    pinned: true
    logo: /img/logo.png
    
    # your sub-pages
    left:
      - text: "Projects"
        href: projects/index.qmd
      - text: "Blog Posts"
        href: blog/index.qmd
      - text: "resume"
        href: resume/index.qmd
    
    # your social media handles
    right:
      - icon: folder-symlink
      - icon: linkedin
        href: https://www.linkedin.com/in/theafricanquant/
      - text: "{{< fa brands linkedin-in >}}"
      - icon: twitter
        href: https://twitter.com/theAfricanQuant
      - text: "{{< fa brands Twitter >}}"
      - icon: github
        href: https://github.com/theAfricanQuant
      - text: "{{< fa brands GitHub >}}"
      - icon: envelope
        href: mailto:Ricky.Macharm@SisengAI.com
      - text: "{{< Email >}}"
  
  

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox
  page-footer: 
    left: |
      <span class="faux-block">&#169; Copyright © 2023, SisengAI</span>
    

project:
  type: website
  output-dir: docs

  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.1em
    theme: 
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true